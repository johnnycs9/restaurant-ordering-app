<html lang="en">
    <head>
       <link rel="stylesheet" href="index.css">
			<script src="index.js" type="module"></script>

			<link rel="preconnect" href="https://fonts.googleapis.com">
			<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
			<link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
    </head>

	<body>
    <!-- <body> -->

		<div class="container">

			<div class="overlay hidden">
				<div class="modal">
					<h1>Enter card details</h1>
					<form id="pay-details">
						<input type="text" name="name" required autocomplete="name" id="full-name" class="payment-text-inputs" placeholder="Enter your name" />
						<input type="text" name="cc" required minlength="16" maxlength="16" autocomplete="cc-number" id="cc" class="payment-text-inputs" placeholder="Enter your card number"/>
						<input type="text" name="cvv" required minlength="3" maxlength="4" id="cvv" autocomplete="cc-csc" class="payment-text-inputs" placeholder="Enter CVV"/>
						<button type="submit" class="btn__cta js-btn-payment">Pay</button>
					</form>

				</div>
			</div>
	

			<header>
			</header>

			<ul id="menu-list__fooditems">
						<!-- Menu items will be rendered here -->
			</ul>
			<div class="thank-you-message hidden">
				<h2>Thank you for your order!</h2>
			</div>

			<div class="order-list__summary hidden">
				<h2 class="order-summary__title">Your Order</h2>
				<ul id="order-list__fooditems">
					<!-- Order summary items will be rendered here -->
					
				</ul>
				
				<hr class="grand-total-divider">

				

				<div class="order__total-price">
					<!-- Total price will be rendered here -->
					<span class="grand-total-price-label">Total price:</span>
					<span class="order__grand-total-price"></span>           
				</div>
				<button class="btn__cta js-btn-complete" id="complete-order-btn">Complete Order</button>
			</div>		
		
		</div>		
				
    </body>
</html>
